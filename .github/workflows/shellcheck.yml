# Runs ShellCheck against all shell scripts managed by this repository.
#
# Scope:
#   - Plain .sh files tracked by chezmoi
#   - Rendered output of .sh.tmpl template files (rendered with full test fixtures)
#   - dot_claude/ is excluded: those files are generated by Claude Code and
#     contain known SC2034 warnings pending a separate fix
name: shellcheck

on:
  push:
    branches: [main]
    paths:
      - '**/*.sh'
      - '**/*.sh.tmpl'
      - 'dot_git_hooks/**'
      - '.github/testdata/**'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - '**/*.sh'
      - '**/*.sh.tmpl'
      - 'dot_git_hooks/**'
      - '.github/testdata/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    name: ShellCheck all shell scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "${HOME}/.local/bin"

      - name: ShellCheck plain shell scripts
        run: |
          find . \( -name "*.sh" -o -name "executable_pre-push" \) \
            -not -path "./.git/*" \
            -not -path "./dot_claude/*" \
            -print0 | xargs -0 shellcheck --severity=warning

      - name: ShellCheck rendered .sh.tmpl files
        run: |
          while IFS= read -r tmpl; do
            echo "ShellCheck: $tmpl"
            "${HOME}/.local/bin/chezmoi" execute-template \
              --config .github/testdata/chezmoi-full.toml -f "$tmpl" | \
              shellcheck --severity=warning --shell=bash -
          done < <(find . -name "*.sh.tmpl" -not -path "./.git/*")
